<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="./main.css">
</head>

<body>
    <div id="container-steps">
        <!-- Etapa 1 -->
        <div class="steps-chat">
            <div id="chat-balloons">
                <div class="avatar-and-loading">
                    <img width="80" src="./imgs/avatar.png" alt="avatar">
                    <div class="add-loader"></div>
                </div>
                <div id="create-chat-step-apresentation"></div>
            </div>
            <div class="inp-step"></div>
            <div class="response-client">
                <div id="result-inp-step-apresentation"></div>
            </div>
        </div>

        <!-- Etapa 2 -->
        <div class="steps-chat">
            <div id="chat-balloons">
                <div class="avatar-and-loading">
                    <img width="80" id="avatar-step-ask-city" class="hide-avatar" src="./imgs/avatar.png" alt="avatar">
                    <div class="add-loader"></div>
                </div>
                <div id="create-chat-step-ask-city"></div>
            </div>
            <div class="inp-step"></div>
            <div class="response-client">
                <div id="result-inp-step-ask-city"></div>
            </div>
        </div>

    </div>
    <script src="./script.js"></script>
</body>

</html>
